services:
  postgres:
    image: postgres:16-alpine
    container_name: telegramv3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - telegramv3_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: telegramv3-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - telegramv3_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: telegramv3-api
    command: ["sh", "-c", "node prisma/seed.js --if-empty && node dist/main"]
    restart: unless-stopped
    environment:
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      AI_DEFAULT_BASE_URL: ${AI_DEFAULT_BASE_URL}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL}
      AI_DEFAULT_API_TOKEN: ${AI_DEFAULT_API_TOKEN}
      AI_DEFAULT_PROMPT: ${AI_DEFAULT_PROMPT}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_PUBLIC_BASE_URL: ${TELEGRAM_PUBLIC_BASE_URL}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_HOST_PORT:-4001}:4000"

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: telegramv3-web
    restart: unless-stopped
    environment:
      API_PROXY_TARGET: http://api:4000/api
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-3002}:3000"

volumes:
  telegramv3_postgres_data:
  telegramv3_redis_data:
