name: CI And Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  ci-api:
    name: CI API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/api
        run: npm run prisma:generate

      - name: Lint API
        working-directory: apps/api
        run: npm run lint

      - name: Build API
        working-directory: apps/api
        run: npm run build

  ci-web:
    name: CI Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint Web
        working-directory: apps/web
        run: npm run lint

      - name: Build Web
        working-directory: apps/web
        env:
          API_PROXY_TARGET: http://api:4000/api
        run: npm run build

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs:
      - ci-api
      - ci-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SSH secrets
        env:
          TELEGRAM_VPS_HOST: ${{ secrets.TELEGRAM_VPS_HOST }}
          TELEGRAM_VPS_USER: ${{ secrets.TELEGRAM_VPS_USER }}
          TELEGRAM_VPS_SSH_KEY: ${{ secrets.TELEGRAM_VPS_SSH_KEY }}
        run: |
          test -n "$TELEGRAM_VPS_HOST"
          test -n "$TELEGRAM_VPS_USER"
          test -n "$TELEGRAM_VPS_SSH_KEY"

      - name: Deploy On VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TELEGRAM_VPS_HOST }}
          username: ${{ secrets.TELEGRAM_VPS_USER }}
          key: ${{ secrets.TELEGRAM_VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/telegramv2
            if [ ! -d /opt/telegramv2/app/.git ]; then
              rm -rf /opt/telegramv2/app
              git clone --depth 1 https://github.com/dinhvansh/telegramv2.git /opt/telegramv2/app
            fi
            cd /opt/telegramv2/app
            git checkout main
            git pull --ff-only origin main
            chmod +x infra/deploy/deploy-vps.sh
            APP_ROOT=/opt/telegramv2 APP_DIR=/opt/telegramv2/app SHARED_DIR=/opt/telegramv2/shared ./infra/deploy/deploy-vps.sh
