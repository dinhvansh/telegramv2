name: CI And Deploy Telegram V3

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-telegramv3-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  APP_ROOT: /opt/telegramv3
  APP_DIR: /opt/telegramv3/app
  SHARED_DIR: /opt/telegramv3/shared
  DEPLOY_DOMAIN: crm.blogthethao.org
  API_HOST_PORT: "4001"
  WEB_HOST_PORT: "3002"

jobs:
  ci-api:
    name: CI API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/api
        run: npm run prisma:generate

      - name: Lint API
        working-directory: apps/api
        run: npm run lint

      - name: Build API
        working-directory: apps/api
        run: npm run build

  ci-web:
    name: CI Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint Web
        working-directory: apps/web
        run: npm run lint

      - name: Build Web
        working-directory: apps/web
        env:
          API_PROXY_TARGET: http://api:4000/api
        run: npm run build

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs:
      - ci-api
      - ci-web

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate SSH secrets
        env:
          TELEGRAM_VPS_HOST: ${{ secrets.TELEGRAM_VPS_HOST }}
          TELEGRAM_VPS_USER: ${{ secrets.TELEGRAM_VPS_USER }}
          TELEGRAM_VPS_SSH_KEY: ${{ secrets.TELEGRAM_VPS_SSH_KEY }}
        run: |
          test -n "$TELEGRAM_VPS_HOST"
          test -n "$TELEGRAM_VPS_USER"
          test -n "$TELEGRAM_VPS_SSH_KEY"

      - name: Create Release Archive
        run: tar --exclude=.git --exclude=.secrets --exclude='demo_telegram - Copy' --exclude='demo_telegram - Copy.rar' -czf /tmp/telegramv3-release.tar.gz .

      - name: Upload Release Archive
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.TELEGRAM_VPS_HOST }}
          username: ${{ secrets.TELEGRAM_VPS_USER }}
          key: ${{ secrets.TELEGRAM_VPS_SSH_KEY }}
          source: /tmp/telegramv3-release.tar.gz
          target: /

      - name: Deploy On VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_ROOT: ${{ env.APP_ROOT }}
          APP_DIR: ${{ env.APP_DIR }}
          SHARED_DIR: ${{ env.SHARED_DIR }}
          DEPLOY_DOMAIN: ${{ env.DEPLOY_DOMAIN }}
          API_HOST_PORT: ${{ env.API_HOST_PORT }}
          WEB_HOST_PORT: ${{ env.WEB_HOST_PORT }}
        with:
          host: ${{ secrets.TELEGRAM_VPS_HOST }}
          username: ${{ secrets.TELEGRAM_VPS_USER }}
          key: ${{ secrets.TELEGRAM_VPS_SSH_KEY }}
          envs: APP_ROOT,APP_DIR,SHARED_DIR,DEPLOY_DOMAIN,API_HOST_PORT,WEB_HOST_PORT
          script: |
            set -eu
            mkdir -p "$APP_ROOT" "$SHARED_DIR"

            test -f /tmp/telegramv3-release.tar.gz
            rm -rf "$APP_DIR"
            mkdir -p "$APP_DIR"
            tar -xzf /tmp/telegramv3-release.tar.gz -C "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -f "$SHARED_DIR/.env.production" ]; then
              echo "Missing $SHARED_DIR/.env.production on VPS. Create it before CI deploy." >&2
              exit 1
            fi
            grep -q '^API_HOST_PORT=' "$SHARED_DIR/.env.production" || printf '\nAPI_HOST_PORT=%s\n' "$API_HOST_PORT" >> "$SHARED_DIR/.env.production"
            grep -q '^WEB_HOST_PORT=' "$SHARED_DIR/.env.production" || printf 'WEB_HOST_PORT=%s\n' "$WEB_HOST_PORT" >> "$SHARED_DIR/.env.production"
            grep -q '^TELEGRAM_PUBLIC_BASE_URL=' "$SHARED_DIR/.env.production" || printf 'TELEGRAM_PUBLIC_BASE_URL=https://%s\n' "$DEPLOY_DOMAIN" >> "$SHARED_DIR/.env.production"

            if command -v nginx >/dev/null 2>&1; then
              mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
              cp "infra/nginx/$DEPLOY_DOMAIN.conf" "/etc/nginx/sites-available/$DEPLOY_DOMAIN.conf"
              ln -sf "/etc/nginx/sites-available/$DEPLOY_DOMAIN.conf" "/etc/nginx/sites-enabled/$DEPLOY_DOMAIN.conf"
              nginx -t
              systemctl reload nginx
            fi

            APP_ROOT="$APP_ROOT" APP_DIR="$APP_DIR" SHARED_DIR="$SHARED_DIR" API_HOST_PORT="$API_HOST_PORT" ./infra/deploy/deploy-vps.sh
