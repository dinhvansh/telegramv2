name: CI And Deploy Telegram V3

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-telegramv3-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  APP_ROOT: /opt/telegramv3
  APP_DIR: /opt/telegramv3/app
  SHARED_DIR: /opt/telegramv3/shared
  DEPLOY_DOMAIN: crm.blogthethao.org
  API_HOST_PORT: "4001"
  WEB_HOST_PORT: "3002"

jobs:
  ci-api:
    name: CI API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/api
        run: npm run prisma:generate

      - name: Lint API
        working-directory: apps/api
        run: npm run lint

      - name: Build API
        working-directory: apps/api
        run: npm run build

  ci-web:
    name: CI Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint Web
        working-directory: apps/web
        run: npm run lint

      - name: Build Web
        working-directory: apps/web
        env:
          API_PROXY_TARGET: http://api:4000/api
        run: npm run build

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs:
      - ci-api
      - ci-web

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate SSH secrets
        env:
          TELEGRAM_VPS_HOST: ${{ secrets.TELEGRAM_VPS_HOST }}
          TELEGRAM_VPS_USER: ${{ secrets.TELEGRAM_VPS_USER }}
          TELEGRAM_VPS_SSH_KEY: ${{ secrets.TELEGRAM_VPS_SSH_KEY }}
        run: |
          test -n "$TELEGRAM_VPS_HOST"
          test -n "$TELEGRAM_VPS_USER"
          test -n "$TELEGRAM_VPS_SSH_KEY"

      - name: Create Release Archive
        run: tar --exclude=.git --exclude=.secrets --exclude='demo_telegram - Copy' --exclude='demo_telegram - Copy.rar' --exclude=telegramv3-release.tar.gz -czf telegramv3-release.tar.gz .

      - name: Upload Release Archive
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.TELEGRAM_VPS_HOST }}
          username: ${{ secrets.TELEGRAM_VPS_USER }}
          key: ${{ secrets.TELEGRAM_VPS_SSH_KEY }}
          source: telegramv3-release.tar.gz
          target: /tmp

      - name: Deploy On VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_ROOT: ${{ env.APP_ROOT }}
          APP_DIR: ${{ env.APP_DIR }}
          SHARED_DIR: ${{ env.SHARED_DIR }}
          DEPLOY_DOMAIN: ${{ env.DEPLOY_DOMAIN }}
          API_HOST_PORT: ${{ env.API_HOST_PORT }}
          WEB_HOST_PORT: ${{ env.WEB_HOST_PORT }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'telegram_ops' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SETTINGS_ENCRYPTION_KEY: ${{ secrets.SETTINGS_ENCRYPTION_KEY }}
          AI_DEFAULT_BASE_URL: ${{ vars.AI_DEFAULT_BASE_URL || 'https://v98store.com/v1' }}
          AI_DEFAULT_MODEL: ${{ vars.AI_DEFAULT_MODEL || 'nexus-guard-mini' }}
          AI_DEFAULT_API_TOKEN: ${{ secrets.AI_DEFAULT_API_TOKEN }}
          AI_DEFAULT_PROMPT: ${{ vars.AI_DEFAULT_PROMPT || 'Ban la AI moderation assistant. Tra ve JSON ngan gon voi risk_score va action_goi_y.' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          TELEGRAM_PUBLIC_BASE_URL: https://${{ env.DEPLOY_DOMAIN }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        with:
          host: ${{ secrets.TELEGRAM_VPS_HOST }}
          username: ${{ secrets.TELEGRAM_VPS_USER }}
          key: ${{ secrets.TELEGRAM_VPS_SSH_KEY }}
          envs: APP_ROOT,APP_DIR,SHARED_DIR,DEPLOY_DOMAIN,API_HOST_PORT,WEB_HOST_PORT,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,JWT_SECRET,SETTINGS_ENCRYPTION_KEY,AI_DEFAULT_BASE_URL,AI_DEFAULT_MODEL,AI_DEFAULT_API_TOKEN,AI_DEFAULT_PROMPT,TELEGRAM_BOT_TOKEN,TELEGRAM_BOT_USERNAME,TELEGRAM_WEBHOOK_SECRET,TELEGRAM_PUBLIC_BASE_URL,TELEGRAM_API_ID,TELEGRAM_API_HASH
          script: |
            set -eu
            mkdir -p "$APP_ROOT" "$SHARED_DIR"

            test -f /tmp/telegramv3-release.tar.gz
            rm -rf "$APP_DIR"
            mkdir -p "$APP_DIR"
            tar -xzf /tmp/telegramv3-release.tar.gz -C "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -f "$SHARED_DIR/.env.production" ]; then
              test -n "$POSTGRES_PASSWORD"
              test -n "$JWT_SECRET"
              test -n "$SETTINGS_ENCRYPTION_KEY"
              cat > "$SHARED_DIR/.env.production" <<EOF
            POSTGRES_DB=$POSTGRES_DB
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            API_HOST_PORT=$API_HOST_PORT
            WEB_HOST_PORT=$WEB_HOST_PORT
            JWT_SECRET=$JWT_SECRET
            SETTINGS_ENCRYPTION_KEY=$SETTINGS_ENCRYPTION_KEY
            AI_DEFAULT_BASE_URL=$AI_DEFAULT_BASE_URL
            AI_DEFAULT_MODEL=$AI_DEFAULT_MODEL
            AI_DEFAULT_API_TOKEN=$AI_DEFAULT_API_TOKEN
            AI_DEFAULT_PROMPT=$AI_DEFAULT_PROMPT
            TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
            TELEGRAM_BOT_USERNAME=$TELEGRAM_BOT_USERNAME
            TELEGRAM_WEBHOOK_SECRET=$TELEGRAM_WEBHOOK_SECRET
            TELEGRAM_PUBLIC_BASE_URL=$TELEGRAM_PUBLIC_BASE_URL
            TELEGRAM_API_ID=$TELEGRAM_API_ID
            TELEGRAM_API_HASH=$TELEGRAM_API_HASH
            NEXT_PUBLIC_API_URL=/api
            EOF
            else
              grep -q '^API_HOST_PORT=' "$SHARED_DIR/.env.production" || printf '\nAPI_HOST_PORT=%s\n' "$API_HOST_PORT" >> "$SHARED_DIR/.env.production"
              grep -q '^WEB_HOST_PORT=' "$SHARED_DIR/.env.production" || printf 'WEB_HOST_PORT=%s\n' "$WEB_HOST_PORT" >> "$SHARED_DIR/.env.production"
              grep -q '^TELEGRAM_PUBLIC_BASE_URL=' "$SHARED_DIR/.env.production" || printf 'TELEGRAM_PUBLIC_BASE_URL=%s\n' "$TELEGRAM_PUBLIC_BASE_URL" >> "$SHARED_DIR/.env.production"
            fi

            if command -v nginx >/dev/null 2>&1; then
              mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
              cp "infra/nginx/$DEPLOY_DOMAIN.conf" "/etc/nginx/sites-available/$DEPLOY_DOMAIN.conf"
              ln -sf "/etc/nginx/sites-available/$DEPLOY_DOMAIN.conf" "/etc/nginx/sites-enabled/$DEPLOY_DOMAIN.conf"
              nginx -t
              systemctl reload nginx
            fi

            APP_ROOT="$APP_ROOT" APP_DIR="$APP_DIR" SHARED_DIR="$SHARED_DIR" API_HOST_PORT="$API_HOST_PORT" ./infra/deploy/deploy-vps.sh
